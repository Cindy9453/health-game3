<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康知識挑戰賽</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .hidden { display: none; }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin: 10px;
            transition: transform 0.2s, background 0.3s;
        }

        .btn:hover { background-color: #45a049; transform: scale(1.05); }

        .option-btn {
            display: block;
            width: 100%;
            background-color: white;
            color: var(--text-color);
            border: 2px solid #ddd;
            margin: 10px 0;
            text-align: left;
        }

        .option-btn:hover { border-color: var(--secondary-color); background: #e3f2fd; }

        #progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--secondary-color);
            width: 0%;
            transition: width 0.3s;
        }

        .score-text { font-size: 1.5rem; color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1>🍎 健康知識挑戰賽</h1>
        <p>測試你的健康觀念是否正確！</p>
        <button class="btn" onclick="startGame()">開始挑戰</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <h2 id="question-text">題目載入中...</h2>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>挑戰完成！</h2>
        <p class="score-text">你的得分：<span id="final-score">0</span> / 100</p>
        <p id="result-message"></p>
        <button class="btn" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<script>
    const questions = [
        { q: "成人每天建議的飲水量（毫升）大約是體重乘以？", a: ["20", "30", "50", "10"], correct: 1 },
        { q: "下列哪種維生素有助於鈣質吸收？", a: ["維生素A", "維生素C", "維生素D", "維生素B12"], correct: 2 },
        { q: "『BMI』是指什麼指標？", a: ["基礎代謝率", "身體質量指數", "體脂肪率", "血壓指數"], correct: 1 },
        { q: "運動後多久內進食對肌肉修復最有幫助？", a: ["30-60分鐘", "3小時後", "隔天", "不需要進食"], correct: 0 },
        { q: "哪種食物被稱為『優質脂肪』來源？", a: ["炸薯條", "酪梨", "瑪格琳", "培根"], correct: 1 }
    ];

    let currentIdx = 0;
    let score = 0;

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            container.appendChild(btn);
        });

        const progress = ((currentIdx) / questions.length) * 100;
        document.getElementById('progress-fill').style.width = `${progress}%`;
    }

    function checkAnswer(selected) {
        if (selected === questions[currentIdx].correct) {
            score += (100 / questions.length);
        }
        
        currentIdx++;
        if (currentIdx < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        
        let msg = score >= 80 ? "太棒了！你是健康達人！" : (score >= 60 ? "還不錯，繼續保持！" : "要多留意健康資訊喔！");
        document.getElementById('result-message').innerText = msg;
    }
</script>

</body>
</html>
